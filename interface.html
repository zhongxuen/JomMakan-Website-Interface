<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JomMakan RMS - Restaurant Management System</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Use Inter font -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8; /* Light background */
            min-height: 100vh;
        }
        .main-content {
            height: calc(100vh - 64px); /* Full height minus header */
            overflow-y: auto;
        }
        /* Custom scrollbar for better aesthetics */
        .main-content::-webkit-scrollbar {
            width: 8px;
        }
        .main-content::-webkit-scrollbar-thumb {
            background-color: #ef4444; /* Red 500 */
            border-radius: 4px;
        }
        .main-content::-webkit-scrollbar-track {
            background: #f0f4f8;
        }
        /* Style for active sidebar item */
        .nav-item.active {
            background-color: #fef2f2; /* Red 50 */
            color: #dc2626; /* Red 600 */
            border-left: 4px solid #dc2626;
            font-weight: 600;
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- Global State -->
    <script>
        const state = {
            view: 'dashboard', // Current view: dashboard, pos, reservations, inventory, customers, staff
            // UI State
            isSidebarOpen: window.innerWidth >= 768, // Open on desktop
            // Inventory State (for the CRUD demo)
            inventoryForm: { name: '', quantity: 1, unit: 'kg' }
        };

        // --- Firebase Setup (Mandatory for Persistence) ---

        // Global variables (Mandatory for Canvas environment)
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'jom-makan-rms';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        let app, db, auth, userId = null;
        let isAuthReady = false;

        // Data state (Example for Inventory)
        let inventoryItems = [
            { id: '1', name: 'Rice (Basmati)', quantity: 50, unit: 'kg', timestamp: new Date() },
            { id: '2', name: 'Chicken Breast', quantity: 20, unit: 'kg', timestamp: new Date() },
            { id: '3', name: 'Cooking Oil', quantity: 15, unit: 'L', timestamp: new Date() },
            { id: '4', name: 'Tomatoes', quantity: 10, unit: 'kg', timestamp: new Date() },
        ]; // Mock data for initial display

        // Message Handling (Replaces alert())
        function showInfoMessage(message) {
            const messageBox = document.getElementById('info-message');
            messageBox.textContent = message;
            messageBox.classList.remove('hidden');
            messageBox.classList.add('flex');
            setTimeout(() => {
                messageBox.classList.add('hidden');
                messageBox.classList.remove('flex');
            }, 4000);
        }

        // --- Core Firebase Initialization and Auth ---
        
        // Use Type=Module script tag below to handle imports and init
        // The definitions are placed here to allow access from window.onload and other functions
    </script>
    
    <!-- Firebase Imports and Logic (Type Module) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, query, where, addDoc, updateDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { setLogLevel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // Re-assigning globals defined in the head script block
        window.app = null;
        window.db = null;
        window.auth = null;
        window.userId = null;
        window.isAuthReady = false;

        const initFirebase = async () => {
            try {
                if (Object.keys(firebaseConfig).length === 0 || !initialAuthToken) {
                    console.warn("Firebase Config or Auth Token missing. Running in Mock Data mode.");
                    window.db = { isMock: true };
                    window.isAuthReady = true;
                    window.userId = 'mock-user';
                    window.setupApp(); // Fallback for UI demo without full Firebase setup
                    return;
                }

                setLogLevel('Debug');
                window.app = initializeApp(firebaseConfig);
                window.db = getFirestore(window.app);
                window.auth = getAuth(window.app);

                onAuthStateChanged(window.auth, (user) => {
                    if (user) {
                        window.userId = user.uid;
                    } else {
                        window.userId = null;
                    }
                    window.isAuthReady = true;
                    window.setupApp();
                });

                if (initialAuthToken) {
                    await signInWithCustomToken(window.auth, initialAuthToken);
                } else {
                    await signInAnonymously(window.auth);
                }

            } catch (error) {
                console.error("Error during Firebase initialization or sign-in:", error);
                // Fallback for UI demo if error occurs
                window.db = { isMock: true };
                window.isAuthReady = true;
                window.userId = 'mock-user-error';
                window.setupApp();
            }
        };

        // --- Data Persistence Functions (Inventory Example) ---

        // Define the collection path for private data: /artifacts/{appId}/users/{userId}/inventory
        const getInventoryCollectionRef = (dbInstance, uid) => {
            return collection(dbInstance, 'artifacts', appId, 'users', uid, 'inventory');
        };

        window.listenToInventory = () => {
            if (window.db.isMock || !window.userId) return;

            const q = query(getInventoryCollectionRef(window.db, window.userId));

            onSnapshot(q, (snapshot) => {
                inventoryItems.length = 0; // Clear existing mock data
                snapshot.docs.forEach(doc => {
                    inventoryItems.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });
                console.log("Inventory Updated from Firestore:", inventoryItems);
                // Re-render if the inventory view is active
                if (state.view === 'inventory') {
                    renderContent();
                }
            }, (error) => {
                console.error("Error listening to inventory:", error);
                showInfoMessage(`Failed to load inventory: ${error.message}`);
            });
        }

        window.addInventoryItem = async (name, quantity, unit) => {
            if (window.db.isMock) {
                showInfoMessage("Mock Data: Cannot save to Firestore. Item added locally.");
                inventoryItems.push({ id: Date.now().toString(), name, quantity: parseInt(quantity), unit, timestamp: new Date() });
                renderContent();
                return;
            }
            try {
                await addDoc(getInventoryCollectionRef(window.db, window.userId), {
                    name,
                    quantity: parseInt(quantity),
                    unit,
                    timestamp: new Date().toISOString()
                });
                showInfoMessage("Inventory item added successfully.");
                // Clear form after successful addition
                state.inventoryForm = { name: '', quantity: 1, unit: 'kg' };
                document.getElementById('inventory-form').reset();
            } catch (e) {
                console.error("Error adding document: ", e);
                showInfoMessage("Error adding item: " + e.message);
            }
        };

        window.deleteInventoryItem = async (id) => {
            if (window.db.isMock) {
                inventoryItems = inventoryItems.filter(item => item.id !== id);
                showInfoMessage(`Mock Data: Item ${id} deleted locally.`);
                renderContent();
                return;
            }
            try {
                const docRef = doc(getInventoryCollectionRef(window.db, window.userId), id);
                await deleteDoc(docRef);
                showInfoMessage("Inventory item deleted successfully.");
            } catch (e) {
                console.error("Error deleting document: ", e);
                showInfoMessage("Error deleting item: " + e.message);
            }
        }
        
        // Start the process
        initFirebase();
    </script>
    <!-- End Firebase Imports -->

    <!-- Global Info Message Box (Replaces alert()) -->
    <div id="info-message" class="hidden fixed top-4 right-4 bg-red-600 text-white p-4 rounded-lg shadow-xl z-[100] transition-opacity duration-300 items-center space-x-2 max-w-xs">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span class="font-medium"></span>
    </div>


    <!-- Header / Navbar -->
    <header class="bg-white shadow-md h-16 flex items-center justify-between px-4 sticky top-0 z-10">
        <div class="flex items-center space-x-4">
            <button id="sidebar-toggle" onclick="toggleSidebar()" class="text-gray-600 focus:outline-none md:hidden p-2 rounded-full hover:bg-gray-100">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
            <span class="text-2xl font-bold text-red-600">JomMakan <span class="text-gray-700 font-light">RMS</span></span>
        </div>
        <div class="flex items-center space-x-3">
            <span class="text-sm text-gray-500 hidden sm:inline">Mr. Harish (Manager)</span>
            <div class="h-10 w-10 bg-red-100 text-red-600 rounded-full flex items-center justify-center font-bold">MH</div>
        </div>
    </header>

    <!-- Main Layout: Sidebar and Content -->
    <div class="flex flex-1">
        
        <!-- Sidebar Navigation -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 bg-white w-64 shadow-lg md:shadow-none z-20">
            <nav class="flex flex-col p-4 space-y-2 pt-6">
                <!-- Dashboard -->
                <a href="#" onclick="changeView('dashboard')" id="nav-dashboard" class="nav-item flex items-center p-3 rounded-xl transition duration-150 hover:bg-red-50 text-gray-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-9-6h2m13 0h2" /></svg>
                    Dashboard & Reports
                </a>
                <!-- Order Management (POS) -->
                <a href="#" onclick="changeView('pos')" id="nav-pos" class="nav-item flex items-center p-3 rounded-xl transition duration-150 hover:bg-red-50 text-gray-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2l-2 2v-2h10a2 2 0 002-2V9z" /></svg>
                    POS & Billing
                </a>
                <!-- Reservations -->
                <a href="#" onclick="changeView('reservations')" id="nav-reservations" class="nav-item flex items-center p-3 rounded-xl transition duration-150 hover:bg-red-50 text-gray-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                    Reservations
                </a>
                <!-- Inventory -->
                <a href="#" onclick="changeView('inventory')" id="nav-inventory" class="nav-item flex items-center p-3 rounded-xl transition duration-150 hover:bg-red-50 text-gray-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 12h14M5 16h14M6 18h12a2 2 0 002-2v-3a2 2 0 00-2-2H6a2 2 0 00-2 2v3a2 2 0 002 2z" /></svg>
                    Inventory Tracking
                </a>
                <!-- Customer Records -->
                <a href="#" onclick="changeView('customers')" id="nav-customers" class="nav-item flex items-center p-3 rounded-xl transition duration-150 hover:bg-red-50 text-gray-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                    Customer CRM
                </a>
                <!-- Staff/Scheduling (Additional Feature 1) -->
                <a href="#" onclick="changeView('staff')" id="nav-staff" class="nav-item flex items-center p-3 rounded-xl transition duration-150 hover:bg-red-50 text-gray-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    Staff & Scheduling
                </a>
                <!-- Promotions/Loyalty (Additional Feature 2) -->
                <a href="#" onclick="changeView('promotions')" id="nav-promotions" class="nav-item flex items-center p-3 rounded-xl transition duration-150 hover:bg-red-50 text-gray-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h10a2 2 0 012 2v10a2 2 0 01-2 2H7a2 2 0 01-2-2V5a2 2 0 012-2z" /></svg>
                    Promotions & Loyalty
                </a>
            </nav>
        </aside>

        <!-- Content Area -->
        <main class="flex-1 p-4 md:p-8 main-content">
            <div id="app-content">
                <!-- Dynamic content will be rendered here -->
            </div>
            <!-- Display User ID for Multi-User Debugging (Mandatory) -->
            <div id="user-info" class="text-xs mt-8 p-4 bg-white rounded-xl shadow-md text-gray-600">
                <span class="font-semibold">System Info:</span> Auth Status: <span id="auth-status">Loading...</span> | User ID: <span id="current-user-id">N/A</span>
            </div>
        </main>
    </div>

    <!-- Backdrop for Mobile Sidebar -->
    <div id="backdrop" class="fixed inset-0 bg-black bg-opacity-50 z-10 hidden md:hidden" onclick="toggleSidebar()"></div>

    <script>
        
        // --- Core UI Logic ---

        function toggleSidebar() {
            state.isSidebarOpen = !state.isSidebarOpen;
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('backdrop');

            if (state.isSidebarOpen) {
                sidebar.classList.remove('-translate-x-full');
                backdrop.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                backdrop.classList.add('hidden');
            }
        }

        function changeView(newView) {
            state.view = newView;
            renderContent();
            // Close sidebar on mobile navigation
            if (window.innerWidth < 768) {
                toggleSidebar();
            }
        }

        function renderContent() {
            const contentDiv = document.getElementById('app-content');
            const navItems = document.querySelectorAll('.nav-item');
            let contentHTML = '';
            let pageTitle = '';

            // Update active state in sidebar
            navItems.forEach(item => {
                item.classList.remove('active');
            });
            const activeNav = document.getElementById(`nav-${state.view}`);
            if (activeNav) {
                activeNav.classList.add('active');
                pageTitle = activeNav.textContent.trim();
            }

            // Render content based on state.view
            switch (state.view) {
                case 'dashboard':
                    contentHTML = renderDashboard();
                    break;
                case 'pos':
                    contentHTML = renderPOS();
                    break;
                case 'reservations':
                    contentHTML = renderReservations();
                    break;
                case 'inventory':
                    contentHTML = renderInventory();
                    break;
                case 'customers':
                    contentHTML = renderCustomers();
                    break;
                case 'staff':
                    contentHTML = renderStaff();
                    break;
                case 'promotions':
                    contentHTML = renderPromotions();
                    break;
                default:
                    contentHTML = renderDashboard();
            }

            contentDiv.innerHTML = `<h1 class="text-3xl font-bold text-gray-800 mb-6">${pageTitle}</h1>` + contentHTML;
            document.title = `JomMakan RMS - ${pageTitle}`;

            // Update Auth Info
            document.getElementById('current-user-id').textContent = userId || 'N/A';
            document.getElementById('auth-status').textContent = isAuthReady ? (db && db.isMock ? 'Mocking Data' : 'Connected') : 'Loading...';
        }

        // --- View Renderer Functions ---

        // 1. Dashboard & Reports (Report Generation)
        function renderDashboard() {
            // Mock data for reporting
            const metrics = [
                { title: 'Total Sales Today', value: 'RM 2,540.50', icon: '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2l-2 2v-2h10a2 2 0 002-2V9z" /></svg>', color: 'bg-green-500' },
                { title: 'New Reservations', value: '14', icon: '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>', color: 'bg-red-500' },
                { title: 'Tables Occupied', value: '8 / 15', icon: '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-9-6h2m13 0h2" /></svg>', color: 'bg-yellow-500' },
                { title: 'Low Stock Items', value: '3', icon: '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>', color: 'bg-blue-500' },
            ];

            return `
                <div class="space-y-8">
                    <!-- Metrics Cards -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        ${metrics.map(m => `
                            <div class="bg-white p-6 rounded-xl shadow-lg transition duration-200 hover:shadow-xl">
                                <div class="flex items-center justify-between">
                                    <p class="text-sm font-medium text-gray-500">${m.title}</p>
                                    <div class="p-2 rounded-full text-white ${m.color}">
                                        ${m.icon}
                                    </div>
                                </div>
                                <p class="text-3xl font-extrabold text-gray-900 mt-1">${m.value}</p>
                            </div>
                        `).join('')}
                    </div>

                    <!-- Report Charts (Mock) -->
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <!-- Daily Sales -->
                        <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-lg">
                            <h2 class="text-xl font-semibold mb-4 text-gray-700">Daily Sales Trend (Past 7 Days)</h2>
                            <div class="h-64 bg-gray-100 flex items-center justify-center text-gray-400 rounded-lg border-2 border-dashed">
                                <!-- Chart Mockup Area (e.g., Line Chart) -->
                                Line Chart Visualization Mockup
                            </div>
                        </div>
                        <!-- Top Selling Items -->
                        <div class="bg-white p-6 rounded-xl shadow-lg">
                            <h2 class="text-xl font-semibold mb-4 text-gray-700">Top 5 Selling Items</h2>
                            <ul class="space-y-3">
                                <li class="flex justify-between p-3 bg-red-50 rounded-lg"><span>1. Nasi Lemak Deluxe</span><span class="font-bold text-red-600">120 Units</span></li>
                                <li class="flex justify-between p-3 bg-red-50 rounded-lg"><span>2. Chicken Rice</span><span class="font-bold">95 Units</span></li>
                                <li class="flex justify-between p-3 bg-red-50 rounded-lg"><span>3. Iced Kopi-O</span><span class="font-bold">88 Units</span></li>
                                <li class="flex justify-between p-3 bg-red-50 rounded-lg"><span>4. Penang Char Kuey Teow</span><span class="font-bold">72 Units</span></li>
                                <li class="flex justify-between p-3 bg-red-50 rounded-lg"><span>5. Mango Smoothie</span><span class="font-bold">60 Units</span></li>
                            </ul>
                        </div>
                    </div>

                    <!-- Staff Performance (Mock) -->
                    <div class="bg-white p-6 rounded-xl shadow-lg">
                        <h2 class="text-xl font-semibold mb-4 text-gray-700">Staff Performance Summary</h2>
                        <div class="overflow-x-auto">
                            <table class="min-w-full divide-y divide-gray-200">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Orders Handled</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Average Service Time</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Total Tips</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-gray-200">
                                    <tr><td class="px-6 py-4 whitespace-nowrap">Ahmad</td><td class="px-6 py-4 whitespace-nowrap">45</td><td class="px-6 py-4 whitespace-nowrap">8:12 min</td><td class="px-6 py-4 whitespace-nowrap">RM 150.00</td></tr>
                                    <tr><td class="px-6 py-4 whitespace-nowrap">Siti</td><td class="px-6 py-4 whitespace-nowrap">38</td><td class="px-6 py-4 whitespace-nowrap">9:05 min</td><td class="px-6 py-4 whitespace-nowrap">RM 125.50</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        // 2. POS & Billing (Order and Billing/Payment Handling)
        function renderPOS() {
            return `
                <div class="flex flex-col lg:flex-row gap-6 h-full min-h-[700px]">
                    
                    <!-- Left Panel: Tables/Orders List -->
                    <div class="lg:w-1/3 bg-white p-6 rounded-xl shadow-lg overflow-y-auto">
                        <h2 class="text-xl font-semibold text-gray-700 mb-4">Active Tables</h2>
                        <div class="space-y-3">
                            <!-- Mock Table Cards -->
                            <div class="bg-blue-50 p-4 rounded-lg flex justify-between items-center cursor-pointer hover:bg-blue-100 transition shadow-sm">
                                <div><p class="font-bold text-lg text-blue-800">Table 5 (Dine-In)</p><p class="text-sm text-gray-600">Party: 4 | Time: 45 min</p></div>
                                <span class="px-3 py-1 text-xs font-semibold bg-blue-600 text-white rounded-full">Active</span>
                            </div>
                            <div class="bg-green-50 p-4 rounded-lg flex justify-between items-center cursor-pointer hover:bg-green-100 transition shadow-sm">
                                <div><p class="font-bold text-lg text-green-800">Online Order #102</p><p class="text-sm text-gray-600">Status: Ready for Pickup</p></div>
                                <span class="px-3 py-1 text-xs font-semibold bg-green-600 text-white rounded-full">New</span>
                            </div>
                            <div class="bg-yellow-50 p-4 rounded-lg flex justify-between items-center cursor-pointer hover:bg-yellow-100 transition shadow-sm">
                                <div><p class="font-bold text-lg text-yellow-800">Table 12 (Takeaway)</p><p class="text-sm text-gray-600">Status: Waiting for Payment</p></div>

        // --- Initialize App on Load ---

        window.setupApp = () => {
            // Start listening to inventory only if Firebase is real and user is authenticated
            if (window.isAuthReady && window.userId && window.db && !window.db.isMock) {
                window.listenToInventory();
            }
            renderContent();
        };

        window.onload = function() {
            // Initial render based on default state.view
            // The Firebase initialization in the script module will call setupApp() when ready.
            if (!window.isAuthReady) {
                 // Initial render of the content if Firebase is slow/mocking.
                renderContent();
            }
        };
